<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/settings.css">
</head>
<body>
    <div class="page-content">
        
        <div class="card">
            <div class="form-group">
                <label class="form-label" id="defaultLanguageLabel">默认语言</label>
                <select class="form-control" id="defaultLanguage">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" id="maxFileSizeLabel">最大文件大小 (MB)</label>
                <input type="number" class="form-control" id="maxFileSize" value="100" min="1" max="1000">
            </div>
            
            <div style="display: flex; justify-content: center; gap: 1rem; margin-top: auto; padding-top: 0.75rem;">
                <button class="btn btn-secondary" id="resetSettingsBtn">恢复默认</button>
                <button class="btn btn-primary" id="saveSettingsBtn">保存设置</button>
            </div>
        </div>
    </div>

    <script src="../js/language.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/settings.js"></script>
</body>
</html>
